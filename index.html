<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seattle Bike Map</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="map"></div>
    <div id="controls">
      <fieldset>
        <legend>Bike infrastructure</legend>
        <label><input type="checkbox" id="toggle-aaa" checked /> All ages &amp; abilities (dark green)</label>
        <label><input type="checkbox" id="toggle-bbl" checked /> Buffered bike lanes</label>
        <label><input type="checkbox" id="toggle-bl" checked /> Standard bike lanes</label>
        <label><input type="checkbox" id="toggle-sharrows" checked /> Sharrows / climbing lanes</label>
        <label><input type="checkbox" id="toggle-planned" /> Planned (gray dotted)</label>
        <label><input type="checkbox" id="toggle-construction" /> Under construction (dotted)</label>
      </fieldset>
      <fieldset>
        <legend>Points</legend>
        <label><input type="checkbox" id="toggle-light-rail" checked /> Light rail stations</label>
        <label><input type="checkbox" id="toggle-pois" checked /> Points of interest</label>
        <label><input type="checkbox" id="toggle-restrooms" checked /> Restrooms</label>
        <label><input type="checkbox" id="toggle-bike-racks" checked /> Bike racks</label>
        <label><input type="checkbox" id="toggle-bike-signs" checked /> Bike signage</label>
      </fieldset>
      <fieldset>
        <legend>Routing</legend>
        <label><input type="checkbox" id="toggle-signals-debug" /> Traffic signals (debug)</label>
        <label><input type="checkbox" id="toggle-crosswalks-debug" /> Crosswalks (debug)</label>
        <label><input type="checkbox" id="toggle-beacons-debug" /> Beacons (debug)</label>
        <button id="clear-route" type="button">Clear route</button>
      </fieldset>
    </div>
    <div id="directions-panel" hidden></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
